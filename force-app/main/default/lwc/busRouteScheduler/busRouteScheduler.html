<template>
    <lightning-card title="Bus Route Scheduler Dashboard" icon-name="custom:custom68">
        <div class="slds-var-p-around_medium">
            
            <lightning-combobox
                name="busSelector"
                label="Select a Bus to Schedule"
                value={selectedBusId}
                placeholder="Choose Active Bus..."
                options={busOptions}
                onchange={handleBusChange}>
            </lightning-combobox>
            <lightning-combobox
                name="RouteSelector"
                label="Select a Route to Schedule"
                value={selectedRouteId}
                placeholder="Choose Active Route..."
                options={routeOptions}
                onchange={handleRouteChange}>
              
            </lightning-combobox>
             <lightning-combobox
                name="RouteTime"
                label="Select a Time Slot to Schedule"
                value={routeTime}
                placeholder="Choose Active Time Slot..."
                options={timeOptions}
                onchange={handleRouteTimeChange}>
              
            </lightning-combobox>
           <lightning-combobox
                name="StatusSelector"
                label="Select a Status to Schedule"
                value={status}
                placeholder="Choose Active Status..."
                options={statusOptions}
                onchange={handleStatusChange}>
              
            </lightning-combobox>
            
            <lightning-input 
                type="date" 
                name="departureDate" 
                label="Select Departure Date" 
                value={selectedDate}
                placeholder="Choose Departure Date..."
                min={todayDate}
                onchange={handleDepartureDateChange}>
            </lightning-input>

            <lightning-button 
                class="slds-var-m-top_medium" 
                variant="brand" 
                label="Save Schedule" 
                onclick={handleSaveSchedule}>   
            </lightning-button>

        </div>
    </lightning-card>
</template>

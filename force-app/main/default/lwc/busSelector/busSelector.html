<template>
    <lightning-card title="Select a Fleet Vehicle" icon-name="utility:classic_interface">
        <div class="slds-var-m-around_medium">
             <img src={shuttleBusImage} alt="Shuttle Bus Layout Configuration" class="bus-graphic"/>

            <lightning-combobox
                name="busSelector"
                label="Active Buses"
                value={selectedBusId}
                placeholder="Choose a Bus..."
                options={busOptions}
                onchange={handleBusChange}>
            </lightning-combobox>
        </div>
    </lightning-card>
</template>

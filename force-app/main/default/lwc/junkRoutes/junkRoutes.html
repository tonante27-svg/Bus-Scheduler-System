<template>
    <lightning-card title="Verify all Current Routes" icon-name="utility:classic_interface">
        <div class="slds-var-m-around_medium">
            <lightning-combobox
                name="routeSelector"
                label="Routes"
                value={selectedRouteId}
                placeholder="Choose a Route..."
                options={routeOptions}
                onchange={handleRouteChange}>
            </lightning-combobox>
        </div>
    </lightning-card>
</template>

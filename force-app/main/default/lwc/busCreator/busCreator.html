<template>
    <lightning-card title="Add New Vehicle to Fleet" icon-name="utility:custom_apps">
        <div class="slds-var-p-around_medium">
             <img src={coachBusImage} alt="Coach Bus Layout Configuration" class="bus-graphic"/>

            <lightning-record-edit-form 
                object-api-name={busObject} 
                onsuccess={handleBusSuccess}>
                
                <div class="slds-grid slds-gutters slds-wrap">
                    <template for:each={fieldList} for:item="field">
                        <div key={field.fieldApiName} class="slds-col slds-size_1-of-3">
                            <lightning-input-field field-name={field}></lightning-input-field>
                        </div>
                    </template>
                </div>

                <div class="slds-var-m-top_medium">
                    <lightning-button 
                        variant="brand" 
                        type="submit" 
                        label="Create Bus & Generate Seats">
                    </lightning-button>
                </div>
                
            </lightning-record-edit-form>
        </div>
    </lightning-card>
</template>
